[package]
name = "browsectl-bin"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "CLI for the Chrome DevTools Protocol, built on the browsectl library — installs the `browse` command"
keywords = ["cdp", "chromium", "chrome", "headless", "devtools"]
categories = ["development-tools::testing", "command-line-utilities"]

[package.metadata.struct-engine]
application_type = "cli"
service_type = "client"

[[bin]]
name = "browse"
path = "main/src/main.rs"

[features]
# Enables --package (Android WebView attach via adb). Forwards to browsectl's
# own android feature, which implements the attach itself.
android = ["browsectl/android"]

[[test]]
name = "cli_e2e_test"
path = "tests/src/cli_e2e_test.rs"

[dependencies]
browsectl = { path = "../browsectl", version = "0.5.0" }
serde.workspace         = true
serde_json.workspace    = true
data-encoding.workspace = true

[dev-dependencies]
serde_json.workspace = true

[lints.rust]
warnings = "deny"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
