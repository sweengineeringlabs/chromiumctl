[package]
name = "browsectl"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "CLI for the Chrome DevTools Protocol — launch, attach, evaluate JS, control viewport (installs the `browse` command)"
keywords = ["cdp", "chromium", "chrome", "headless", "devtools"]
categories = ["development-tools::testing", "command-line-utilities"]

[package.metadata.struct-engine]
application_type = "cli"
service_type = "client"

[[bin]]
name = "browse"
path = "main/src/main.rs"

[features]
# Enables --package (Android WebView attach via adb). Forwards to cdp-client's
# own android feature, which implements the attach itself.
android = ["cdp-client/android"]

[[test]]
name = "cli_e2e_test"
path = "tests/src/cli_e2e_test.rs"

[dependencies]
cdp-client = { path = "../cdp-client", version = "0.4.1" }
serde.workspace         = true
serde_json.workspace    = true
data-encoding.workspace = true

[dev-dependencies]
serde_json.workspace = true

[lints.rust]
warnings = "deny"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
